<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0"/>
<meta name="referrer" content="no-referrer"/>
<title></title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;width:100%;background:#fff;overflow:hidden}
.wrap{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;background:#fff;z-index:2}
.loader{width:80px;height:80px;position:relative;animation:rotate 2s ease-in-out infinite}
.dot{width:12px;height:12px;border-radius:50%;position:absolute;top:50%;left:50%;margin:-6px 0 0 -6px}
.d1{background:#ffe386;animation:d1 2s ease infinite}
.d2{background:#10beae;animation:d2 2s ease infinite}
.d3{background:#f74d75;animation:d3 2s ease infinite}
@keyframes d1{20%{transform:scale(1)}45%{transform:translate(14px,10px) scale(.4)}60%,80%{transform:translate(18px,13px) scale(.4)}100%{transform:translate(0) scale(1)}}
@keyframes d2{20%{transform:scale(1)}45%{transform:translate(-14px,10px) scale(.4)}60%,80%{transform:translate(-18px,13px) scale(.4)}100%{transform:translate(0) scale(1)}}
@keyframes d3{20%{transform:scale(1)}45%{transform:translateY(-16px) scale(.4)}60%,80%{transform:translateY(-22px) scale(.4)}100%{transform:translate(0) scale(1)}}
@keyframes rotate{55%{transform:rotate(0)}80%,100%{transform:rotate(360deg)}}
.txt{margin-top:30px;font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:14px;color:#999;text-align:center}
.safe{margin-top:16px;display:flex;align-items:center;justify-content:center;font-family:-apple-system,sans-serif;font-size:12px;color:#52c41a}
.safe-icon{width:14px;height:14px;margin-right:4px;fill:#52c41a}
.wechat-guide{position:fixed;inset:0;display:none;background:linear-gradient(180deg,#f7f8fb 0%,#fff 52%,#f4f6fb 100%);z-index:10;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#1d1d1f;overflow:hidden}
.wechat-guide:before{content:"";position:absolute;top:-120px;right:-100px;width:260px;height:260px;border-radius:50%;background:rgba(102,126,234,.13)}
.wechat-guide:after{content:"";position:absolute;bottom:-150px;left:-110px;width:280px;height:280px;border-radius:50%;background:rgba(16,190,174,.12)}
.guide-arrow{position:absolute;top:18px;right:22px;width:84px;height:84px;color:#667eea;transform:rotate(-8deg)}
.guide-panel{position:relative;z-index:1;min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:44px 28px;text-align:center}
.guide-card{width:100%;max-width:360px;padding:34px 26px 30px;border-radius:28px;background:rgba(255,255,255,.86);box-shadow:0 24px 70px rgba(31,35,48,.12);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px)}
.guide-icon{width:68px;height:68px;margin:0 auto 22px;border-radius:22px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#28c76f 0%,#18a058 100%);box-shadow:0 14px 30px rgba(40,199,111,.28)}
.guide-icon svg{width:34px;height:34px;fill:#fff}
.guide-title{font-size:22px;font-weight:700;letter-spacing:.2px;margin-bottom:12px}
.guide-desc{font-size:15px;line-height:1.7;color:#6e6e73;margin-bottom:14px}
.guide-safe{display:inline-flex;align-items:center;justify-content:center;gap:6px;margin-bottom:24px;padding:8px 13px;border-radius:999px;background:#edfdf4;color:#18a058;font-size:13px;font-weight:600}
.guide-safe svg{width:15px;height:15px;fill:currentColor}
.guide-steps{display:flex;flex-direction:column;gap:12px;text-align:left}
.guide-step{display:flex;align-items:flex-start;gap:10px;padding:13px 14px;border-radius:16px;background:#f5f6fa;color:#333;font-size:14px;line-height:1.45}
.guide-num{flex:0 0 auto;width:22px;height:22px;border-radius:50%;background:#1d1d1f;color:#fff;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center}
.guide-note{margin-top:20px;font-size:12px;line-height:1.5;color:#9b9ba1}
.go-btn{display:none;align-items:center;justify-content:center;padding:12px 32px;border-radius:24px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;text-decoration:none;font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:15px;font-weight:500;box-shadow:0 8px 24px rgba(102,126,234,0.4);margin-top:30px;letter-spacing:0.5px}
.go-btn:active{transform:scale(0.96);opacity:0.9}
.err{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#f8f9fa;border:1px solid #dee2e6;border-radius:12px;padding:24px;text-align:center;font-family:-apple-system,sans-serif;font-size:15px;color:#495057;box-shadow:0 8px 24px rgba(0,0,0,0.12);max-width:300px;display:none;z-index:5}
.err .msg{margin-bottom:16px;line-height:1.5}
.err a{display:inline-block;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;text-decoration:none;padding:10px 24px;border-radius:20px;font-size:14px}
</style>
</head>
<body>
<div class="wechat-guide" id="wechatGuide">
<svg class="guide-arrow" viewBox="0 0 120 120" aria-hidden="true">
<path d="M27 82c31-9 51-28 62-57" fill="none" stroke="currentColor" stroke-width="7" stroke-linecap="round"/>
<path d="M73 28l19-8 7 20" fill="none" stroke="currentColor" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
<div class="guide-panel">
<div class="guide-card">
<div class="guide-icon">
<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9.55 16.6 4.95 12l1.41-1.41 3.19 3.18 8.09-8.08L19.05 7.1l-9.5 9.5z"/></svg>
</div>
<div class="guide-title">请在浏览器中打开</div>
<div class="guide-desc">微信内置浏览器可能限制跳转访问，请按下面步骤继续。</div>
<div class="guide-safe">
<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 1 3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm-1.2 15.6-4.2-4.2 1.41-1.41 2.79 2.78 5.69-5.68 1.41 1.41-7.1 7.1z"/></svg>
<span>引导页面已通过安全检测，100%安全</span>
</div>
<div class="guide-steps">
<div class="guide-step"><span class="guide-num">1</span><span>点击右上角的「···」菜单</span></div>
<div class="guide-step"><span class="guide-num">2</span><span>选择「在浏览器打开」后继续访问</span></div>
</div>
<div class="guide-note">如果没有看到该选项，请复制当前链接到 Safari、Chrome 或系统浏览器打开。</div>
</div>
</div>
</div>
<a id="nav" style="display:none" referrerpolicy="no-referrer"></a>
<div class="wrap" id="loading">
<div class="loader">
<div class="dot d1"></div>
<div class="dot d2"></div>
<div class="dot d3"></div>
</div>
<div class="txt" id="loadingText">正在加载中...</div>
<div class="safe">
<svg class="safe-icon" viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm-2 16l-4-4 1.41-1.41L10 14.17l6.59-6.59L18 9l-8 8z"/></svg>
已通过安全检测
</div>
<a class="go-btn" id="goBtn" href="#">点击继续访问</a>
</div>
<div class="err" id="errBox">
<div class="msg" id="errMsg"></div>
<a href="">重新加载</a>
</div>
<script>
!function(){
    var REDIRECT_BASE = 'https://weixin88.onrender.com/';
    var nav = document.getElementById('nav');
    var loading = document.getElementById('loading');
    var loadingText = document.getElementById('loadingText');
    var wechatGuide = document.getElementById('wechatGuide');
    var goBtn = document.getElementById('goBtn');
    var errBox = document.getElementById('errBox');
    var errMsg = document.getElementById('errMsg');

    function isWeiXinOrQQ(){
        var ua = navigator.userAgent.toLowerCase();
        return ua.indexOf('micromessenger') > -1 ||
               ua.indexOf('qq/') > -1 ||
               ua.indexOf('qzone/') > -1 ||
               ua.indexOf('weibo') > -1;
    }

    function getToken(){
        var url = new URL(document.URL);
        var m = url.pathname.match(/\/(i|u|go|r)\/([A-Za-z0-9_-]+)/);
        if(m && m[2]) return m[2];
        var keys = ['u','i','id','c'];
        for(var k = 0; k < keys.length; k++){
            var v = url.searchParams.get(keys[k]);
            if(v && /^[A-Za-z0-9_-]{4,64}$/.test(v)) return v;
        }
        var hash = (url.hash || '').replace(/^#/,'');
        var hp = new URLSearchParams(hash);
        var hkeys = ['u','i'];
        for(var h = 0; h < hkeys.length; h++){
            var hv = hp.get(hkeys[h]);
            if(hv && /^[A-Za-z0-9_-]{4,64}$/.test(hv)) return hv;
        }
        return '';
    }

    function showError(msg){
        if(loading) loading.style.display = 'none';
        errMsg.textContent = msg;
        errBox.style.display = 'block';
    }

    function init(){
        if(isWeiXinOrQQ()){
            if(loading) loading.style.display = 'none';
            wechatGuide.style.display = 'block';
            return;
        }

        var token = getToken();
        if(!token){
            showError('无效的跳转链接');
            return;
        }

        var targetUrl = REDIRECT_BASE + '?i=' + encodeURIComponent(token);

        nav.href = targetUrl;
        goBtn.href = targetUrl;
        nav.click();

        setTimeout(function(){
            loadingText.textContent = '请点击下方按钮继续';
            goBtn.style.display = 'inline-flex';
        }, 1500);
    }

    if(document.readyState === 'loading'){
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
}();
</script>
</body>
</html>
